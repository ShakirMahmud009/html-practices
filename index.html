<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRACTICES</title>

</head>
<style>
</style>
<body>
    <form>
    <div>
    <fieldset>
        <legend align="center">Profile</legend>
        <label for="fname">First Name:</label>
        <input type="text" pattern="^\S+$" placeholder="Enter your first name" required> 
        <div align="right">
            <label for="Profession" placeholder="profession">Profession:</label>
            <select id="Profession" name="Profession">
                <option value="Engineer">Engineer</option>
                <option value="Doctor">Doctor</option>
                <option value="Teacher">Teacher</option>
            </select> 
        </div>
        <label for="lname">Last Name:</label>
        <input type="text" placeholder="Enter your last name" required> <br> <br>
        <div>
            <label for="gender">Gender:</label>
            <input list="gender" placeholder="Select your gender">
            <datalist id="gender">
                <option value="Male">
                <option value="Female">
                <option value="Other">
            </datalist>
        </div><br
        <label for="dob">Date of Birth:</label>
        <input type="date" required><br> <br>
        <label for="address">Address:</label>
        <textarea rows="3" cols="20" name="address" placeholder="Enter your address here..."></textarea>
    </fieldset>
    </div>
    <div>
    <fieldset>
        <legend align="center">Privacy</legend>
        <label for="email">Email:</label>
        <input type="email" size="70" placeholder="Enter your email"> <br> <br>
        <label for="password">Password:</label>
        <input type="password" placeholder="Enter your password"> <br> <br>
        <label for="phone">Phone Number:</label>
        <input type="number" id="phone" size="50" placeholder="Enter your phone number">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label> <br> <br>
        <div align="right">
            <button><a href="mailto:rocktheman2018@gmail.com" style="text-decoration:none;"><b>Mail Us</b></a></button>
            <button><a href="tel:+8801995074001" style="text-decoration:none;"><b>Call Us</b></a></button>
        </div>
    </fieldset>
    </div>
    <br> 
    <button type="submit" style="align-self: center; color: blue;">Submit</button>
    </form><br> <br>

</body>
</html>
